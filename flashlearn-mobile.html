<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script>
// ── Redirection automatique corrigée ──
(function() {
  var ua = navigator.userAgent;
  var isMobile = /Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua);
  var pathname = window.location.pathname;
  var currentFile = pathname.split('/').pop();
  var basePath = pathname.substring(0, pathname.lastIndexOf('/') + 1);
  var isDesktopFile = currentFile === 'flashcard-app.html' || currentFile === 'index.html' || currentFile === '';
  var isMobileFile  = currentFile === 'flashlearn-mobile.html';

  if (isMobile && isDesktopFile) {
    window.location.replace(basePath + 'flashlearn-mobile.html');
    return;
  }
  if (!isMobile && isMobileFile) {
    window.location.replace(basePath + 'index.html');
    return;
  }
})();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>FlashLearn Mobile</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f17;
  --surface: #1a1a28;
  --surface2: #22223a;
  --border: #2e2e4a;
  --accent: #4255ff;
  --accent-light: #6b7aff;
  --green: #23d18b;
  --red: #ff4d6a;
  --yellow: #ffcd1f;
  --text: #e8e8f5;
  --muted: #8888aa;
  --radius: 16px;
  --nav-h: 80px;
  --tab-h: 64px;
}

* { 
  box-sizing: border-box; 
  margin: 0; padding: 0; 
  -webkit-tap-highlight-color: transparent; 
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  /* Support Safe Areas iOS */
  padding-top: env(safe-area-inset-top);
}

/* ── TOP NAV ── */
.top-nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: calc(var(--nav-h) + env(safe-area-inset-top));
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-end; justify-content: space-between;
  padding: 0 16px 12px 16px;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

.logo-wrap {
  display: flex; align-items: center; gap: 8px;
}

.logo-ascii {
  font-family: monospace;
  font-size: 4px; /* Ajusté pour visibilité */
  line-height: 1;
  background: linear-gradient(135deg, var(--accent), var(--green));
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  white-space: pre;
}

.version-pill {
  font-size: 10px; font-weight: 700; color: var(--accent-light);
  background: rgba(66,85,255,.12); border: 1px solid rgba(66,85,255,.3);
  border-radius: 6px; padding: 2px 6px;
}

/* ── BOTTOM TAB BAR ── */
.tab-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  height: calc(var(--tab-h) + env(safe-area-inset-bottom));
  background: var(--bg);
  border-top: 1px solid var(--border);
  display: flex; align-items: flex-start;
  padding-bottom: env(safe-area-inset-bottom);
}

.tab-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: var(--tab-h); gap: 4px;
  color: var(--muted); transition: all .2s;
}

.tab-item.active { color: var(--accent-light); }

/* ── PAGES ── */
.app-scroll {
  padding-top: calc(var(--nav-h) + env(safe-area-inset-top));
  padding-bottom: calc(var(--tab-h) + env(safe-area-inset-bottom) + 20px);
  min-height: 100vh;
  -webkit-overflow-scrolling: touch;
}

.page { display: none; }
.page.active { display: block; animation: fadeUp .3s cubic-bezier(0.4, 0, 0.2, 1); }

@keyframes fadeUp { 
  from { opacity:0; transform:translateY(15px); } 
  to { opacity:1; transform:translateY(0); } 
}

/* ── CARDS & COMPONENTS (Correction WebKit) ── */
.set-card-v {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  margin: 0 16px 12px;
  padding: 16px;
  display: flex; align-items: center; gap: 14px;
  -webkit-appearance: none;
}

.search-bar, .home-search-bar {
  margin: 12px 16px 20px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px; padding: 12px;
  display: flex; align-items: center; gap: 10px;
}

input, textarea {
  background: none; border: none; outline: none;
  color: var(--text); font-family: inherit;
  font-size: 16px; /* Évite le zoom automatique sur iOS */
  -webkit-appearance: none;
}

.fc-area { 
  perspective: 1000px;
  -webkit-perspective: 1000px;
}

.fc-inner {
  transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  transform-style: preserve-3d;
  -webkit-transform-style: preserve-3d;
}

.fc-face {
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}

/* ── FAB & UTILS ── */
.fab {
  position: fixed; 
  bottom: calc(var(--tab-h) + env(safe-area-inset-bottom) + 20px); 
  right: 20px;
  width: 56px; height: 56px; border-radius: 18px;
  background: var(--accent);
  box-shadow: 0 8px 24px rgba(66,85,255,0.4);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; color: white; z-index: 90;
}

/* Toasts iOS Style */
#toast {
  position: fixed; 
  bottom: calc(var(--tab-h) + env(safe-area-inset-bottom) + 30px);
  left: 50%; transform: translateX(-50%);
  background: rgba(34, 34, 58, 0.95);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 12px 24px; border-radius: 50px;
  font-size: 14px; font-weight: 600;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  opacity: 0; transition: 0.3s; pointer-events: none;
}
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<!-- Top Nav -->
<nav class="top-nav">
  <div class="logo-wrap" onclick="switchTab('home')">
    <div class="logo-ascii">
███████╗██╗      █████╗ ███████╗██╗  ██╗
██╔════╝██║     ██╔══██╗██╔════╝██║  ██║
█████╗  ██║     ███████║███████╗███████║
    </div>
    <span class="version-pill">v2.7 Mobile</span>
  </div>
  <div style="display:flex;gap:12px">
    <div class="icon-btn" onclick="triggerImport()">↑</div>
    <a href="index.html" class="icon-btn" style="text-decoration:none">🖥</a>
  </div>
</nav>

<div class="app-scroll">
  <!-- Contenu des pages identique mais avec les corrections de variables -->
  <div id="page-home" class="page active">
    <div class="home-search-bar">
      <span>🔍</span>
      <input type="text" placeholder="Rechercher un set..." oninput="filterSets(this.value)">
    </div>
    <div id="sets-container"></div>
  </div>

  <div id="page-detail" class="page">
    <!-- Contenu Detail... -->
    <div class="set-detail-header">
       <button class="back-btn" onclick="showPage('home')">←</button>
       <div id="detail-title" class="set-detail-title"></div>
    </div>
    <div class="mode-grid">
        <div class="mode-btn" onclick="startFlash()">⚡ Flashcards</div>
        <div class="mode-btn" onclick="startTest()">📝 QCM</div>
    </div>
    <div id="detail-cards-list"></div>
  </div>
</div>

<!-- Tab Bar -->
<div class="tab-bar">
  <div class="tab-item active" id="tab-home" onclick="switchTab('home')">
    <span>🏠</span><div class="tab-label">Accueil</div>
  </div>
  <div class="tab-item" id="tab-library" onclick="switchTab('library')">
    <span>📚</span><div class="tab-label">Bibliothèque</div>
  </div>
  <div class="tab-item" id="tab-profile" onclick="switchTab('profile')">
    <span>👤</span><div class="tab-label">Profil</div>
  </div>
</div>

<div class="fab" id="fab" onclick="showPage('create')">＋</div>
<div id="toast"></div>

<script>
// Les fonctions JS restent globalement les mêmes, 
// mais assurez-vous d'utiliser les bonnes variables corrigées.

let sets = JSON.parse(localStorage.getItem('flashlearn_sets') || '[]');

function switchTab(id) {
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  showPage(id);
  if(id === 'home') renderHome();
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const target = document.getElementById('page-' + id);
  if(target) target.classList.add('active');
}

function renderHome() {
  const container = document.getElementById('sets-container');
  if (sets.length === 0) {
    container.innerHTML = '<div class="empty-state"><h3>Bienvenue !</h3><p>Créez votre premier set.</p></div>';
    return;
  }
  container.innerHTML = sets.map(s => `
    <div class="set-card-v" onclick="openSet('${s.id}')">
      <div style="flex:1">
        <div class="set-card-v-title">${s.title}</div>
        <div class="set-card-v-meta">${s.cards.length} cartes</div>
      </div>
      <div class="set-card-v-count">→</div>
    </div>
  `).join('');
}

// Initialisation
renderHome();

// Gestion du Toast corrigée
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  setTimeout(() => { t.style.opacity = '0'; }, 2000);
}
</script>
</body>
</html>
